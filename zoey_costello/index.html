                // Eye glow effect
                ctx.fillStyle = `rgba(255, 100, 100, ${eyePulse * 0.5})`;
                ctx.beginPath();
                ctx.arc(-8, -25, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(8, -25, 8, 0, Math.PI * 2);
                ctx.fill();

                // Antenna (weapon-like)
                ctx.fillStyle = '#444';
                ctx.fillRect(-3, -55, 6, 15);
                ctx.fillStyle = '#f00';
                const antennaPulse = Math.sin(Date.now() / 300) * 0.5 + 0.5;
                ctx.globalAlpha = antennaPulse;
                ctx.beginPath();
                ctx.arc(0, -58, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;

                // Mouth (speaker grille with sinister grin shape)
                ctx.fillStyle = '#111';
                ctx.beginPath();
                ctx.moveTo(-12, -12);
                ctx.quadraticCurveTo(0, -5, 12, -12);
                ctx.lineTo(12, -8);
                ctx.quadraticCurveTo(0, -2, -12, -8);
                ctx.closePath();
                ctx.fill();
                // Red lines in speaker
                ctx.strokeStyle = '#800';
                ctx.lineWidth = 1;
                for (let i = -8; i <= 8; i += 4) {
                    ctx.beginPath();
                    ctx.moveTo(i, -11);
                    ctx.lineTo(i, -6);
                    ctx.stroke();
                }

                // "DOOM-7" label
                ctx.fillStyle = '#f00';
                ctx.font = 'bold 6px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('DOOM-7', 0, 55);

                ctx.restore();
            }
        }

        // Draw minimap
        function drawMinimap() {
            const mapWidth = minimapCanvas.width;
            const mapHeight = minimapCanvas.height;

            // Clear minimap
            minimapCtx.clearRect(0, 0, mapWidth, mapHeight);

            // Calculate scale
            const scaleX = mapWidth / worldWidth;
            const scaleY = mapHeight / worldHeight;

            // Draw sky area on minimap
            const skyHeightOnMap = SKY_HEIGHT * scaleY;
            const skyGradient = minimapCtx.createLinearGradient(0, 0, 0, skyHeightOnMap);
            skyGradient.addColorStop(0, 'rgba(135, 206, 235, 0.8)');
            skyGradient.addColorStop(1, 'rgba(176, 224, 230, 0.8)');
            minimapCtx.fillStyle = skyGradient;
            minimapCtx.fillRect(0, 0, mapWidth, skyHeightOnMap);

            // Draw water area on minimap
            const waterGradient = minimapCtx.createLinearGradient(0, skyHeightOnMap, 0, mapHeight);
            if (pollutionActive) {
                // Polluted water colors
                waterGradient.addColorStop(0, 'rgba(100, 180, 200, 0.8)'); // Slightly green surface
                waterGradient.addColorStop(DEEP_WATER_THRESHOLD, `rgba(50, 100, 80, ${0.8 * pollutionLevel + 0.2})`);
                waterGradient.addColorStop(1, `rgba(10, 60, 30, ${0.9 * pollutionLevel + 0.1})`); // Dark green deep
            } else {
                waterGradient.addColorStop(0, 'rgba(100, 180, 220, 0.8)');
                waterGradient.addColorStop(1, 'rgba(10, 80, 120, 0.8)');
            }
            minimapCtx.fillStyle = waterGradient;
            minimapCtx.fillRect(0, skyHeightOnMap, mapWidth, mapHeight - skyHeightOnMap);

            // Draw poison clouds on minimap
            if (pollutionActive && poisonClouds.length > 0) {
                for (const cloud of poisonClouds) {
                    const cloudMapX = cloud.x * scaleX;
                    const cloudMapY = cloud.y * scaleY;
                    const cloudMapRadius = Math.max(2, cloud.radius * scaleX);

                    // Draw poison cloud as a green blob
                    minimapCtx.fillStyle = `rgba(0, 150, 50, ${cloud.opacity * pollutionLevel * 0.6})`;
                    minimapCtx.beginPath();
                    minimapCtx.arc(cloudMapX, cloudMapY, cloudMapRadius, 0, Math.PI * 2);
                    minimapCtx.fill();
                }
            }

            // Draw water surface line
            minimapCtx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            minimapCtx.lineWidth = 1;
            minimapCtx.beginPath();
            minimapCtx.moveTo(0, skyHeightOnMap);
            minimapCtx.lineTo(mapWidth, skyHeightOnMap);
            minimapCtx.stroke();

            // Draw sea floor
            const floorY = (worldHeight - 80) * scaleY;
            minimapCtx.fillStyle = 'rgba(139, 115, 85, 0.8)';
            minimapCtx.fillRect(0, floorY, mapWidth, mapHeight - floorY);

            // Draw beach with gradual slope on minimap (matching the bigger slope)
            const slopeStartX = (worldWidth - 3000) * scaleX;
            const beachTopX = (worldWidth - 200) * scaleX;

            // Underwater slope - use bezier curve to match main view
            minimapCtx.fillStyle = 'rgba(194, 178, 128, 0.9)';
            minimapCtx.beginPath();
            minimapCtx.moveTo(slopeStartX, floorY);
            minimapCtx.bezierCurveTo(
                slopeStartX + (beachTopX - slopeStartX) * 0.4,
                floorY - 3,
                slopeStartX + (beachTopX - slopeStartX) * 0.7,
                floorY - (floorY - skyHeightOnMap) * 0.6,
                beachTopX,
                skyHeightOnMap
            );
            minimapCtx.lineTo(mapWidth, skyHeightOnMap);
            minimapCtx.lineTo(mapWidth, floorY);
            minimapCtx.lineTo(slopeStartX, floorY);
            minimapCtx.closePath();
            minimapCtx.fill();

            // Above water land (darker brown/green)
            minimapCtx.fillStyle = 'rgba(100, 140, 80, 0.9)';
            minimapCtx.fillRect(beachTopX, 0, mapWidth - beachTopX, skyHeightOnMap);

            // Evil lab marker
            minimapCtx.fillStyle = 'rgba(60, 60, 60, 0.9)';
            const labX = (worldWidth - 200 + 250) * scaleX;
            minimapCtx.fillRect(labX, skyHeightOnMap - 8, 8, 8);

            // Draw direction signs as small dots
            minimapCtx.fillStyle = 'rgba(139, 69, 19, 0.6)';
            for (const sign of signs) {
                const signX = sign.x * scaleX;
                const signY = sign.y * scaleY;
                minimapCtx.beginPath();
                minimapCtx.arc(signX, signY, 2, 0, Math.PI * 2);
                minimapCtx.fill();
            }

            // Draw camera viewport
            const viewX = camera.x * scaleX;
            const viewY = camera.y * scaleY;
            const viewW = screenWidth * scaleX;
            const viewH = screenHeight * scaleY;
            minimapCtx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            minimapCtx.lineWidth = 2;
            minimapCtx.strokeRect(viewX, viewY, viewW, viewH);

            // Draw player on minimap
            const playerMapX = player.x * scaleX;
            const playerMapY = player.y * scaleY;

            // Player glow
            minimapCtx.fillStyle = 'rgba(32, 178, 170, 0.5)';
            minimapCtx.beginPath();
            minimapCtx.arc(playerMapX, playerMapY, 6, 0, Math.PI * 2);
            minimapCtx.fill();

            // Player dot
            minimapCtx.fillStyle = '#20B2AA';
            minimapCtx.beginPath();
            minimapCtx.arc(playerMapX, playerMapY, 4, 0, Math.PI * 2);
            minimapCtx.fill();

            // Draw scientist and robot if visible
            if (bankScene.triggered || player.x > worldWidth - 500) {
                // Scientist
                minimapCtx.fillStyle = '#FFD700';
                minimapCtx.beginPath();
                minimapCtx.arc(bankScene.scientist.x * scaleX, bankScene.scientist.y * scaleY, 3, 0, Math.PI * 2);
                minimapCtx.fill();

                // Robot
                minimapCtx.fillStyle = '#708090';
                minimapCtx.beginPath();
                minimapCtx.arc(bankScene.robot.x * scaleX, bankScene.robot.y * scaleY, 3, 0, Math.PI * 2);
                minimapCtx.fill();
            }

            // Draw destination marker (arrow pointing right)
            minimapCtx.fillStyle = 'rgba(255, 215, 0, 0.8)';
            minimapCtx.font = '12px Georgia';
            minimapCtx.textAlign = 'center';
            minimapCtx.fillText('★', beachTopX - 5, mapHeight / 2);
        }

        // Main game loop
        function gameLoop(timestamp) {
            const deltaTime = Math.min((timestamp - lastTimestamp) / 1000, 0.1);
            lastTimestamp = timestamp;

            // Update
            updateTime(deltaTime);
            updatePlayer(deltaTime);
            updateCamera();
            updateBubbles(deltaTime);
            updateFish(deltaTime);
            updateLightRays(deltaTime);
            updateToxicBubbles(deltaTime);
            updatePoisonClouds(deltaTime);

            // Draw
            drawSky();
            drawWaterBackground();
            drawPollutionOverlay(); // Draw pollution effect on deep water
            drawLightRays();
            drawSeaFloor();
            drawSeaCreatures();
            drawFish();
            drawSigns();
            drawBubbles();
            drawToxicBubbles(); // Draw toxic bubbles
            drawBank();

            if (bankScene.triggered || player.x > worldWidth - 500) {
                drawScientist();
                drawRobot();
            }

            drawMermaid();

            // Draw minimap
            drawMinimap();

            requestAnimationFrame(gameLoop);
        }

        // Start game
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
